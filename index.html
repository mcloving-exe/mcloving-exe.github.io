    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background: #151515;
            color: #fff;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url("fondo.jpg") center center/cover no-repeat fixed;
        }

        .bg::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            backdrop-filter: blur(8px);
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, .06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, .05) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, .03) 0%, transparent 60%);
        }

        .card {
            position: relative;
            z-index: 1;
            width: 400px;
            max-width: 92%;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 28px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
            opacity: 0;
            transform: translateY(30px) scale(.97);
            animation: cardIn .8s cubic-bezier(.22, 1, .36, 1) .2s forwards;
        }

        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .profile {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, .75);
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(255, 255, 255, .15);
            transition: border-color .3s, box-shadow .3s;
        }

        .profile:hover {
            border-color: #fff;
            box-shadow: 0 0 40px rgba(255, 255, 255, .25);
        }

        .placeholder {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 3px solid rgba(255, 255, 255, .25);
            background: rgba(255, 255, 255, .05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: rgba(255, 255, 255, .3);
            transition: border-color .3s, box-shadow .3s;
        }

        .placeholder:hover {
            border-color: #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, .2);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: .5px;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bio {
            color: #b0b0b0;
            font-size: 15px;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 32px;
        }

        .socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b0b0b0;
            text-decoration: none;
            transition: all .25s ease;
        }

        .socials a:hover {
            color: #fff;
            transform: translateY(-3px);
        }

        .socials a svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .links a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 500;
            transition: all .25s ease;
            position: relative;
            overflow: hidden;
        }

        .links a::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 14px;
            opacity: 0;
            transition: opacity .25s ease;
        }

        .links a:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, .3);
            box-shadow: 0 8px 30px rgba(255, 255, 255, .1);
        }

        .links a:hover::before {
            opacity: 1;
        }

        .links a:nth-child(1)::before { background: rgba(255, 255, 255, .08); }
        .links a:nth-child(2)::before { background: rgba(255, 255, 255, .08); }
        .links a:nth-child(3)::before { background: rgba(255, 255, 255, .08); }
        .links a:nth-child(4)::before { background: rgba(255, 255, 255, .08); }

        .links a svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            fill: currentColor;
        }

        .links a svg[viewBox="0 0 48 48"] {
            fill: none;
            stroke: currentColor;
        }

        .footer {
            margin-top: 32px;
            color: #666;
            font-size: 12px;
            font-weight: 300;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 24px;
                border-radius: 22px;
            }

            .profile, .placeholder {
                width: 120px;
                height: 120px;
            }

            h1 { font-size: 22px; }
            .links a { padding: 12px 16px; font-size: 14px; }
        }
    </style>
</head>
